events {
    worker_connections 1024;
}

http {
    include mime.types;
    sendfile on;

    server {
        listen 8000;
        listen [::]:8000;

        resolver 127.0.0.11;
        autoindex off;

        server_name _;
        server_tokens off;

        root /app;
        index index.html;

        location /static {
            root /app/static;           
        }

        rewrite ^.*$ /index.html;

        gzip_static on;
    }
}