version: '3.7'

x-app: &base-app
  build:
    context: .
    target: deploy
  environment: &base-app-env
    API_PORT: 8000
  ports:
    - 8000

volumes:
  cache:

services:
  dev:
    <<: *base-app
    build:
      context: .
      target: deploy
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:8000"
    environment:
      <<: *base-app-env
    
  app: &app
    <<: *base-app
    build:
      context: .
      target: deploy
    image: ${REGISTRY:-localhost:5000}/${REPOSITORY:-aapp/images/admin}:${VERSION:-latest}
    environment:
      <<: *base-app-env
      # DEBUG: "false"
    healthcheck:
      test: curl -f http://localhost:8000/status/health
      interval: 10s
      timeout: 1s
      retries: 5